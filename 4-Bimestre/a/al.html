<!DOCTYPE html>
<html>
<head>
    <title>Jogo de Adivinhação</title>
</head>
<body>
    <h1>Jogo de Adivinhação</h1>
    <p>Escolha um número entre 0 e 100:</p>
    <input type="number" id="userInput" min="0" max="100">
    <button onclick="checkNumber()">Verificar</button>
    <p id="result"></p>

    <script>
        var randomNumber = Math.floor(Math.random() * 101); 

        function checkNumber() {
            var userInput = document.getElementById('userInput').value;
            var result = document.getElementById('result');

            if (userInput < randomNumber) {
                result.textContent = "O numero e maior";
            } else if (userInput > randomNumber) {
                result.textContent = "O numero e menor";
            } else {
                result.textContent = "Parabens voce acertou";
            }
        }
    </script>
</body>
</html>
